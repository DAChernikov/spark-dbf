name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: examples/requirements.txt
      - name: Install generator and PySpark Scala 2.12 runtime
        run: python -m pip install -r examples/requirements.txt pyspark==3.5.4
      - name: Download Spark Scala 2.13 runtime
        run: |
          curl -fsSL -o spark.tgz "https://archive.apache.org/dist/spark/spark-3.5.4/spark-3.5.4-bin-hadoop3-scala2.13.tgz"
          tar -xzf spark.tgz
      - name: Generate small DBF fixtures
        run: python examples/generate_dbf_examples.py --small-only --overwrite
      - name: Test and build both Scala artifacts
        run: scripts/build-all.sh
      - name: Validate Scala 2.12 assembly through PySpark
        run: |
          spark-submit --master local[2] \
            --jars dist/spark-dbf_2.12-0.2.0-assembly.jar \
            examples/read_and_validate_dbf.py \
            --base-path examples/generated \
            --scala-binary-version 2.12
      - name: Validate Scala 2.13 assembly through Spark
        run: |
          ./spark-3.5.4-bin-hadoop3-scala2.13/bin/spark-submit \
            --master local[2] \
            --jars dist/spark-dbf_2.13-0.2.0-assembly.jar \
            examples/read_and_validate_dbf.py \
            --base-path examples/generated \
            --scala-binary-version 2.13
      - uses: actions/upload-artifact@v4
        with:
          name: spark-dbf-0.2.0-release
          path: dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: |
            spark-dbf 0.2.0

            - Added DBT and FPT text MEMO support with executor-side Hadoop file discovery.
            - Added separate assembly JARs for Scala 2.12 and Scala 2.13.
            - Tested with Spark 3.5.2-3.5.4, local files, HDFS, and real PySpark/Spark runtimes.
          files: |
            dist/spark-dbf_2.12-0.2.0-assembly.jar
            dist/spark-dbf_2.12-0.2.0-assembly.jar.sha256
            dist/spark-dbf_2.13-0.2.0-assembly.jar
            dist/spark-dbf_2.13-0.2.0-assembly.jar.sha256
