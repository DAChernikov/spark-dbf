name: build

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-scala-2-12:
    name: build-scala-2.12 (Spark ${{ matrix.spark-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        spark-version: ["3.5.2", "3.5.3", "3.5.4"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: examples/requirements.txt
      - name: Generate small DBF fixtures
        run: |
          python -m pip install -r examples/requirements.txt
          python examples/generate_dbf_examples.py --small-only --overwrite
      - name: Verify Scala 2.12 with Spark ${{ matrix.spark-version }}
        run: ./mvnw clean verify -Pscala-2.12 -Dspark.version=${{ matrix.spark-version }}
      - name: Inspect assembly JAR
        run: scripts/inspect-jar.sh target/spark-dbf_2.12-0.2.0-assembly.jar
      - uses: actions/upload-artifact@v4
        if: matrix.spark-version == '3.5.4'
        with:
          name: spark-dbf_2.12-0.2.0-assembly
          path: target/spark-dbf_2.12-0.2.0-assembly.jar

  build-scala-2-13:
    name: build-scala-2.13 (Spark ${{ matrix.spark-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        spark-version: ["3.5.2", "3.5.3", "3.5.4"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: examples/requirements.txt
      - name: Generate small DBF fixtures
        run: |
          python -m pip install -r examples/requirements.txt
          python examples/generate_dbf_examples.py --small-only --overwrite
      - name: Verify Scala 2.13 with Spark ${{ matrix.spark-version }}
        run: ./mvnw clean verify -Pscala-2.13 -Dspark.version=${{ matrix.spark-version }}
      - name: Inspect assembly JAR
        run: scripts/inspect-jar.sh target/spark-dbf_2.13-0.2.0-assembly.jar
      - uses: actions/upload-artifact@v4
        if: matrix.spark-version == '3.5.4'
        with:
          name: spark-dbf_2.13-0.2.0-assembly
          path: target/spark-dbf_2.13-0.2.0-assembly.jar

  pyspark-scala-2-12:
    name: pyspark-scala-2.12 (Spark ${{ matrix.spark-version }})
    needs: build-scala-2-12
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        spark-version: ["3.5.2", "3.5.4"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: examples/requirements.txt
      - name: Install generator and PySpark
        run: python -m pip install -r examples/requirements.txt pyspark==${{ matrix.spark-version }}
      - name: Generate small DBF fixtures and assembly
        run: |
          python examples/generate_dbf_examples.py --small-only --overwrite
          ./mvnw clean package -Pscala-2.12 -DskipTests -Dspark.version=${{ matrix.spark-version }}
      - name: Validate assembly through PySpark
        run: |
          spark-submit --master local[2] \
            --jars target/spark-dbf_2.12-0.2.0-assembly.jar \
            examples/read_and_validate_dbf.py \
            --base-path examples/generated \
            --scala-binary-version 2.12
      - name: Inspect assembly JAR
        run: scripts/inspect-jar.sh target/spark-dbf_2.12-0.2.0-assembly.jar

  pyspark-scala-2-13:
    name: pyspark-scala-2.13 (Spark ${{ matrix.spark-version }})
    needs: build-scala-2-13
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        spark-version: ["3.5.2", "3.5.4"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: examples/requirements.txt
      - name: Install fixture generator
        run: python -m pip install -r examples/requirements.txt
      - name: Download Spark Scala 2.13 runtime
        run: |
          curl -fsSL -o spark.tgz "https://archive.apache.org/dist/spark/spark-${{ matrix.spark-version }}/spark-${{ matrix.spark-version }}-bin-hadoop3-scala2.13.tgz"
          tar -xzf spark.tgz
      - name: Generate small DBF fixtures and assembly
        run: |
          python examples/generate_dbf_examples.py --small-only --overwrite
          ./mvnw clean package -Pscala-2.13 -DskipTests -Dspark.version=${{ matrix.spark-version }}
      - name: Validate assembly through Spark Scala 2.13
        run: |
          "./spark-${{ matrix.spark-version }}-bin-hadoop3-scala2.13/bin/spark-submit" \
            --master local[2] \
            --jars target/spark-dbf_2.13-0.2.0-assembly.jar \
            examples/read_and_validate_dbf.py \
            --base-path examples/generated \
            --scala-binary-version 2.13
      - name: Inspect assembly JAR
        run: scripts/inspect-jar.sh target/spark-dbf_2.13-0.2.0-assembly.jar

  java-11:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven
      - name: Verify default Scala 2.12 profile on Java 11
        run: ./mvnw clean verify -Pscala-2.12
